<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YONO SBI — PEHLA KADAM 2.0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --blue:#003087;--cyan:#0077b6;--light:#00b4d8;--deep:#001a4d;
  --ok:#00875A;--warn:#F5A623;--err:#ff4d6d;--ok2:#00d4a0;
  --glass:rgba(255,255,255,0.07);--gb:rgba(255,255,255,0.13);
  --ts:rgba(255,255,255,0.65);--tm:rgba(255,255,255,0.38);
}
html,body,#root{height:100%;font-family:'Inter',sans-serif;background:#000;}
body{overflow-x:hidden;}
.app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;background:#000;overflow:hidden;}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;}
.screen::-webkit-scrollbar{display:none;}
*{scrollbar-width:none;}
.bg-lang{background:radial-gradient(ellipse at 50% -10%,#0077b6 0%,#001a4d 40%,#000 80%);}
.bg-login{background:radial-gradient(ellipse at 50% 0%,#003087 0%,#000 70%);}
.bg-dash{background:linear-gradient(180deg,#001a4d 0%,#000 35%);}
.bg-dark{background:#050a14;}
.bg-nova{background:radial-gradient(ellipse at 60% 20%,#001a4d 0%,#000 65%);}
.bg-welcome{background:linear-gradient(160deg,#003087 0%,#0077b6 40%,#001a4d 100%);}
.bg-success{background:radial-gradient(ellipse at 50% 30%,#00875A 0%,#003087 50%,#000 100%);}
.bg-growth{background:linear-gradient(180deg,#0a1628 0%,#050a14 100%);}
@keyframes morph{0%,100%{border-radius:60% 40% 50% 70%/50% 60% 40% 60%;}25%{border-radius:40% 60% 70% 30%/60% 40% 50% 70%;}50%{border-radius:70% 30% 40% 60%/30% 70% 60% 40%;}75%{border-radius:30% 70% 60% 40%/70% 30% 40% 60%;}}
@keyframes pulse2{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(1.5);}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes typing{0%,100%{transform:translateY(0);opacity:.4;}50%{transform:translateY(-6px);opacity:1;}}
@keyframes progress{from{width:0%;}to{width:var(--pw,70%);}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(0,180,216,.3);}50%{box-shadow:0 0 40px rgba(0,180,216,.6);}}
@keyframes pop{0%{transform:scale(0);}70%{transform:scale(1.15);}100%{transform:scale(1);}}
@keyframes shine{0%{left:-100%;}100%{left:200%;}}
.su{animation:slideUp .38s ease forwards;}
.fi{animation:fadeIn .3s ease forwards;}
.yono-logo{font-size:42px;font-weight:900;color:#fff;letter-spacing:2px;text-align:center;}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.lang-btn{background:linear-gradient(135deg,rgba(0,119,182,.4),rgba(0,180,216,.2));border:1px solid var(--gb);border-radius:50px;padding:13px;color:#fff;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .2s;text-align:center;}
.lang-btn.sel,.lang-btn:hover{background:linear-gradient(135deg,#0077b6,#00b4d8);border-color:#00b4d8;}
.svc-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.svc-card{background:rgba(0,119,182,.18);border:1px solid var(--gb);border-radius:12px;padding:11px;}
.svc-card h4{font-size:9px;font-weight:700;color:#00b4d8;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.svc-li{list-style:none;font-size:9px;color:var(--ts);padding:2px 0 2px 10px;position:relative;}
.svc-li::before{content:"•";color:#00b4d8;position:absolute;left:0;}
.btn-main{width:100%;background:linear-gradient(90deg,#0077b6,#00b4d8);border:none;border-radius:50px;padding:16px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.3px;position:relative;overflow:hidden;}
.btn-main::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);animation:shine 2.5s infinite;}
.btn-main:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,119,182,.4);}
.btn-ghost{background:rgba(255,255,255,.07);color:rgba(255,255,255,.7);border:1px solid var(--gb);}
.btn-ghost::after{display:none;}
.btn-ghost:hover{background:rgba(255,255,255,.12);}
.btn-danger{background:rgba(255,77,109,.15);color:#ff4d6d;border:1px solid rgba(255,77,109,.3);}
.btn-danger::after{display:none;}
.btn-success{background:linear-gradient(90deg,#00875A,#00d4a0);}
.btn-success::after{display:none;}
.login-wrap{padding:60px 28px 40px;}
.card{background:rgba(255,255,255,.05);border:1px solid var(--gb);border-radius:22px;padding:26px;backdrop-filter:blur(20px);}
.card h2{font-size:20px;font-weight:700;color:#fff;margin-bottom:4px;}
.card p{font-size:13px;color:var(--ts);margin-bottom:20px;}
.ig{margin-bottom:14px;}
.ig label{display:block;font-size:10px;color:var(--tm);letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px;}
.ig input{width:100%;background:rgba(255,255,255,.07);border:1px solid var(--gb);border-radius:11px;padding:13px 15px;color:#fff;font-size:15px;outline:none;font-family:'Inter',sans-serif;transition:border-color .2s;}
.ig input:focus{border-color:#00b4d8;}
.ig input::placeholder{color:var(--tm);}
.bio-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0;}
.bio-btn{background:rgba(255,255,255,.05);border:1px solid var(--gb);border-radius:12px;padding:12px;color:var(--ts);font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s;}
.bio-btn:hover{background:rgba(255,255,255,.1);color:#fff;}
.otp-row{display:flex;gap:8px;margin-top:8px;}
.otp-inp{flex:1;background:rgba(255,255,255,.07);border:1px solid var(--gb);border-radius:11px;padding:13px 4px;color:#fff;font-size:18px;font-weight:700;text-align:center;outline:none;transition:all .2s;}
.otp-inp:focus{border-color:#00b4d8;}
.topnav{display:flex;align-items:center;justify-content:space-between;padding:52px 20px 14px;}
.user-greet{font-size:12px;color:var(--ts);}
.user-name{font-size:20px;font-weight:700;color:#fff;margin-top:2px;}
.nav-right{display:flex;align-items:center;gap:10px;}
.notif-btn{background:rgba(255,255,255,.08);border:1px solid var(--gb);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;font-size:18px;}
.ndot{position:absolute;top:7px;right:7px;width:9px;height:9px;background:var(--err);border-radius:50%;border:1.5px solid #000;}
.avatar{width:40px;height:40px;background:linear-gradient(135deg,#0077b6,#00b4d8);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;cursor:pointer;}
.bal-card{margin:0 16px;background:linear-gradient(135deg,rgba(0,48,135,.9),rgba(0,119,182,.65));border:1px solid rgba(0,180,216,.3);border-radius:22px;padding:22px;position:relative;overflow:hidden;animation:glow 4s ease-in-out infinite;}
.bal-card::before{content:'';position:absolute;top:-60px;right:-60px;width:220px;height:220px;background:radial-gradient(circle,rgba(0,180,216,.2),transparent 70%);border-radius:50%;}
.bal-label{font-size:11px;color:rgba(255,255,255,.55);letter-spacing:.5px;text-transform:uppercase;position:relative;z-index:1;}
.bal-amount{font-size:36px;font-weight:800;color:#fff;margin:6px 0 5px;position:relative;z-index:1;letter-spacing:-1px;}
.bal-meta{font-size:11px;color:rgba(255,255,255,.45);position:relative;z-index:1;}
.bal-actions{display:flex;gap:8px;margin-top:16px;position:relative;z-index:1;}
.bal-action{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:7px 13px;font-size:11px;font-weight:600;color:#fff;cursor:pointer;text-transform:uppercase;letter-spacing:.3px;transition:all .2s;}
.bal-action:hover{background:rgba(255,255,255,.22);}
.nova-section{margin:18px 16px 0;}
.nova-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:50px;padding:7px 14px;font-size:10px;font-weight:600;color:var(--ts);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:11px;}
.ndot2{width:6px;height:6px;background:#00b4d8;border-radius:50%;animation:pulse2 2s ease-in-out infinite;}
.nova-q{background:rgba(255,255,255,.06);border:1px solid var(--gb);border-radius:18px;padding:16px 18px;font-size:15px;font-weight:500;color:#fff;line-height:1.45;margin-bottom:12px;}
.nova-row{display:flex;gap:9px;}
.nova-input{flex:1;background:rgba(255,255,255,.07);border:1px solid var(--gb);border-radius:50px;padding:12px 17px;color:#fff;font-size:14px;outline:none;font-family:'Inter',sans-serif;transition:all .2s;}
.nova-input::placeholder{color:var(--tm);}
.nova-input:focus{border-color:#00b4d8;}
.voice-btn{width:46px;height:46px;background:linear-gradient(135deg,#0077b6,#00b4d8);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;flex-shrink:0;transition:transform .2s;}
.voice-btn:hover{transform:scale(1.08);}
.send-btn{width:46px;height:46px;background:rgba(255,255,255,.09);border:1px solid var(--gb);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0;}
.sec{margin:18px 16px 0;}
.sec-label{font-size:10px;font-weight:700;color:var(--tm);letter-spacing:2px;text-transform:uppercase;margin-bottom:11px;}
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;}
.quick-item{background:rgba(255,255,255,.05);border:1px solid var(--gb);border-radius:14px;padding:13px 6px;text-align:center;cursor:pointer;transition:all .2s;}
.quick-item:hover{background:rgba(255,255,255,.1);transform:translateY(-2px);}
.q-icon{font-size:22px;margin-bottom:5px;}
.q-label{font-size:9px;font-weight:600;color:var(--ts);letter-spacing:.5px;text-transform:uppercase;}
.a-card{background:rgba(255,255,255,.045);border:1px solid var(--gb);border-radius:16px;padding:16px;margin-bottom:11px;position:relative;overflow:hidden;}
.a-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;}
.a-card.salary::before{background:var(--ok2);}
.a-card.alert::before{background:var(--warn);}
.a-card.danger::before{background:var(--err);}
.a-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.a-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.a-ico.salary{background:rgba(0,212,160,.14);}
.a-ico.alert{background:rgba(245,166,35,.14);}
.a-ico.danger{background:rgba(255,77,109,.14);}
.a-time{font-size:11px;color:var(--tm);}
.a-title{font-size:14px;font-weight:600;color:#fff;margin-bottom:4px;}
.a-body{font-size:12px;color:var(--ts);line-height:1.45;margin-bottom:12px;}
.a-btns{display:flex;gap:8px;}
.abtn{border-radius:20px;padding:7px 15px;font-size:11px;font-weight:600;cursor:pointer;border:none;transition:all .2s;letter-spacing:.3px;}
.abtn.p{background:linear-gradient(90deg,#0077b6,#00b4d8);color:#fff;}
.abtn.s{background:rgba(255,255,255,.07);color:var(--ts);border:1px solid var(--gb);}
.txn-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
.see-all{font-size:12px;color:#00b4d8;cursor:pointer;font-weight:500;}
.txn-card{background:rgba(255,255,255,.035);border:1px solid var(--gb);border-radius:16px;overflow:hidden;}
.txn-item{display:flex;align-items:center;padding:13px 15px;border-bottom:1px solid rgba(255,255,255,.046);}
.txn-item:last-child{border-bottom:none;}
.txn-ico{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;margin-right:11px;}
.txn-info{flex:1;}
.txn-name{font-size:13px;font-weight:500;color:#fff;}
.txn-meta{font-size:10px;color:var(--tm);margin-top:2px;}
.txn-amt{font-size:13px;font-weight:600;}
.txn-amt.credit{color:var(--ok2);}
.txn-amt.debit{color:var(--ts);}
.bottom-nav{position:sticky;bottom:0;background:rgba(5,10,20,.96);border-top:1px solid var(--gb);display:flex;padding:10px 0 18px;z-index:10;backdrop-filter:blur(24px);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:5px 0;transition:all .2s;}
.nav-icon{font-size:21px;color:var(--tm);transition:all .2s;}
.nav-label{font-size:9px;font-weight:600;color:var(--tm);letter-spacing:.5px;text-transform:uppercase;transition:all .2s;}
.nav-item.active .nav-icon,.nav-item.active .nav-label{color:#00b4d8;}
.nav-item.active .nav-icon{transform:scale(1.14);}
.score-ring{position:relative;width:160px;height:160px;margin:0 auto 16px;}
.score-inner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.score-num{font-size:40px;font-weight:900;color:#fff;}
.score-lbl{font-size:11px;color:var(--ts);}
.score-list{margin:0 16px;}
.score-item{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;background:rgba(255,255,255,.038);border:1px solid var(--gb);border-radius:13px;margin-bottom:8px;}
.si-left{display:flex;align-items:center;gap:9px;}
.si-right{display:flex;align-items:center;gap:9px;}
.si-bar{width:78px;height:5px;background:rgba(255,255,255,.09);border-radius:3px;overflow:hidden;}
.si-fill{height:100%;border-radius:3px;animation:progress 1.2s ease forwards;}
.si-val{font-size:12px;font-weight:600;color:#00b4d8;min-width:26px;text-align:right;}
.stage-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:11px;}
.stage-card{background:rgba(255,255,255,.038);border:1px solid var(--gb);border-radius:13px;padding:11px 6px;text-align:center;cursor:pointer;transition:all .2s;}
.stage-card.active{background:rgba(0,119,182,.22);border-color:rgba(0,180,216,.38);}
.stage-card:hover{background:rgba(255,255,255,.08);}
.chat-hdr{padding:52px 20px 14px;display:flex;align-items:center;gap:11px;}
.back-btn{width:38px;height:38px;background:rgba(255,255,255,.07);border:1px solid var(--gb);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;color:#fff;flex-shrink:0;transition:all .2s;}
.back-btn:hover{background:rgba(255,255,255,.14);}
.msg-wrap{margin-bottom:13px;}
.msg-wrap.user{display:flex;justify-content:flex-end;}
.bubble{padding:12px 15px;border-radius:18px;font-size:13px;line-height:1.5;}
.bubble.ai{background:rgba(0,119,182,.22);border:1px solid rgba(0,180,216,.18);color:#fff;border-radius:4px 18px 18px 18px;max-width:84%;}
.bubble.user{background:linear-gradient(135deg,#0077b6,#00b4d8);color:#fff;border-radius:18px 18px 4px 18px;max-width:78%;}
.intent-card{background:rgba(0,48,135,.28);border:1px solid rgba(0,180,216,.26);border-radius:13px;padding:13px;margin-top:8px;}
.irow{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.ilbl{font-size:10px;color:var(--tm);text-transform:uppercase;letter-spacing:1px;}
.ival{font-size:11px;font-weight:600;color:#00b4d8;}
.conf-bar{height:5px;background:rgba(255,255,255,.09);border-radius:3px;overflow:hidden;margin-bottom:10px;}
.conf-fill{height:100%;background:linear-gradient(90deg,#0077b6,#00b4d8);border-radius:3px;}
.pill-action{display:inline-flex;background:rgba(0,180,216,.12);border:1px solid rgba(0,180,216,.28);border-radius:18px;padding:5px 12px;font-size:11px;font-weight:500;color:#00b4d8;cursor:pointer;}
.why-box{background:rgba(0,48,135,.18);border:1px solid rgba(0,180,216,.18);border-radius:12px;padding:13px;margin-top:9px;}
.why-title{font-size:10px;font-weight:700;color:#00b4d8;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.why-item{display:flex;align-items:flex-start;gap:7px;margin-bottom:6px;font-size:11px;color:var(--ts);}
.why-chk{color:var(--ok2);flex-shrink:0;font-size:13px;}
.tdot{width:7px;height:7px;background:rgba(0,180,216,.6);border-radius:50%;animation:typing 1.4s ease-in-out infinite;display:inline-block;margin-right:4px;}
.chat-input-bar{padding:10px 16px 24px;display:flex;align-items:center;gap:9px;border-top:1px solid var(--gb);background:rgba(5,10,20,.88);backdrop-filter:blur(20px);}
.chat-inp{flex:1;background:rgba(255,255,255,.07);border:1px solid var(--gb);border-radius:22px;padding:12px 17px;color:#fff;font-size:13px;outline:none;font-family:'Inter',sans-serif;}
.chat-inp::placeholder{color:var(--tm);}
.chat-inp:focus{border-color:#00b4d8;}
.chat-send{width:44px;height:44px;background:linear-gradient(135deg,#0077b6,#00b4d8);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0;}
.atabs{display:flex;gap:6px;padding:14px 20px 0;overflow-x:auto;}
.atab{background:rgba(255,255,255,.055);border:1px solid var(--gb);border-radius:20px;padding:7px 14px;font-size:11px;font-weight:600;color:var(--ts);cursor:pointer;white-space:nowrap;transition:all .2s;}
.atab.active{background:linear-gradient(90deg,#0077b6,#00b4d8);border-color:transparent;color:#fff;}
.chart-box{margin:14px 16px;background:rgba(255,255,255,.038);border:1px solid var(--gb);border-radius:16px;padding:18px;}
.chart-title{font-size:12px;font-weight:600;color:#fff;margin-bottom:14px;}
.cat-item{display:flex;align-items:center;padding:11px 13px;background:rgba(255,255,255,.036);border:1px solid var(--gb);border-radius:12px;margin-bottom:7px;}
.cat-dot{width:9px;height:9px;border-radius:50%;margin-right:9px;flex-shrink:0;}
.insight-box{margin:0 16px 10px;background:rgba(0,48,135,.2);border:1px solid rgba(0,180,216,.18);border-radius:13px;padding:13px;}
.insight-lbl{font-size:9px;font-weight:700;color:#00b4d8;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;}
.insight-box p{font-size:12px;color:var(--ts);line-height:1.5;}
.fd-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;}
.fd-type{background:rgba(255,255,255,.045);border:1px solid var(--gb);border-radius:13px;padding:13px;cursor:pointer;transition:all .2s;}
.fd-type.sel{background:rgba(0,119,182,.22);border-color:rgba(0,180,216,.38);}
.fd-type h4{font-size:12px;font-weight:600;color:#fff;margin-bottom:2px;}
.fd-type p{font-size:10px;color:var(--ts);}
.fd-rate{font-size:17px;font-weight:700;color:#00b4d8;margin-top:5px;}
.fd-calc{background:rgba(255,255,255,.038);border:1px solid var(--gb);border-radius:16px;padding:18px;margin-bottom:14px;}
.fd-lbl{font-size:10px;color:var(--tm);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;display:block;}
.fd-inp{width:100%;background:rgba(255,255,255,.07);border:1px solid var(--gb);border-radius:10px;padding:11px 13px;color:#fff;font-size:15px;font-weight:600;outline:none;font-family:'Inter',sans-serif;margin-bottom:12px;}
.fd-inp:focus{border-color:#00b4d8;}
.fd-result{background:linear-gradient(135deg,rgba(0,119,182,.28),rgba(0,180,216,.1));border:1px solid rgba(0,180,216,.26);border-radius:13px;padding:14px;margin-top:14px;}
.fd-row{display:flex;justify-content:space-between;margin-bottom:7px;}
.fd-rl{font-size:12px;color:var(--ts);}
.fd-rv{font-size:12px;font-weight:600;color:#fff;}
.fd-rv.hl{color:var(--ok2);}
.meth-tabs{display:flex;gap:7px;margin-bottom:16px;}
.m-tab{flex:1;background:rgba(255,255,255,.055);border:1px solid var(--gb);border-radius:11px;padding:9px 3px;color:rgba(255,255,255,.5);font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:all .2s;}
